<script>
const state = { pdfFiles:[], imgFiles:[], pdfData:[], imgData:[], discrepancies:[], resolutions:{}, xlsxBlob:null };

// ==============================================
// UPDATED PROMPTS (the most important change)
// ==============================================

const UNIVERSAL_EXTRACTION_PROMPT = `You are an expert architectural document transcriber. Your job is to extract door schedule tables with perfect accuracy and zero interpretation.

First, examine the table structure and identify all column headers exactly as printed.

Then extract EVERY row as a JSON array of objects. Each object MUST have these exact keys (use empty string "" for missing values):

doorNo, location, qty, type, width, height, thick, matl, finish, frameThick, frameMatl, frameFinish, hdwSet, remarks, noa

STRICT RULES - FOLLOW EXACTLY:
- location: Copy the text EXACTLY as written in the LOCATION / DESCRIPTION / ROOM column. Never shorten "1 BED SUITE", "1 BED SUITE ADA", "EXIST. STAIR 2", "CONDITIONED GARBAGE RM", etc.
- thick: Always extract the door thickness (usually "1 3/4" or "1 3/8"). Never leave this field blank.
- doorNo: Exact door number/mark as printed (e.g. "D-100", "D-404", etc.)
- width / height: Convert to inches only (3'-00" → 36, 10'-06" → 126, 13'-00" → 156, etc.)
- type: Exact letter(s) from the TYPE column (A, B, C, D, F, G, H, etc.)
- matl, finish, frameMatl, frameThick, frameFinish, hdwSet, remarks, noa: Copy the text exactly as shown. Do not interpret or summarize.
- If a cell is blank or contains only a dash, use ""
- One JSON object per door line. Do not combine or split rows.
- Return ONLY a valid JSON array. No explanations, no markdown, no extra text.

This data will be used for construction documents. Accuracy is critical.`;

async function parseImagesRaw(files, logFn) {
  const allRows = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (logFn) logFn(`Parsing screenshot ${i+1} of ${files.length}: ${file.name}…`);

    try {
      const b64 = await fileToBase64(file);
      let mediaType = file.type || 'image/jpeg';
      if (file.type === 'image/png') mediaType = 'image/png';
      if (file.type === 'image/webp') mediaType = 'image/webp';

      const raw = await callClaude([{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: b64 } },
          { type: 'text', text: UNIVERSAL_EXTRACTION_PROMPT }
        ]
      }], 8000, logFn);

      const parsed = repairJSON(extractJSONArray(raw));
      allRows.push(...parsed);
      if (logFn) logFn(` ✓ ${parsed.length} doors from ${file.name}`);
    } catch (e) {
      throw new Error(`Failed parsing ${file.name}: ${e.message}`);
    }
  }
  return allRows;
}

async function parsePDFWithClaude(file, idx, total, logFn) {
  if (logFn) logFn(`Parsing PDF ${idx+1} of ${total}: ${file.name}…`);
  const b64 = await fileToBase64(file);

  const raw = await callClaude([{
    role: 'user',
    content: [
      { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } },
      { type: 'text', text: UNIVERSAL_EXTRACTION_PROMPT }
    ]
  }], 16000, logFn);

  const parsed = repairJSON(extractJSONArray(raw));
  if (logFn) logFn(` ✓ ${parsed.length} doors from ${file.name}`);
  return parsed;
}

// The rest of your original script remains unchanged
// (fileToBase64, callClaude, extractJSONArray, repairJSON, diffPdfVsImg, etc.)

function extractJSONArray(text){
  const a=text.indexOf('['),b=text.lastIndexOf(']');
  if(a!==-1&&b!==-1&&b>a)return text.substring(a,b+1);
  return text.replace(/^```[\w]*\n?/gm,'').replace(/```\s*$/,'').trim();
}

function repairJSON(clean){
  try{return JSON.parse(clean);}catch(e){}
  const last=clean.lastIndexOf('}');
  if(last>0){try{return JSON.parse(clean.slice(0,last+1)+']');}catch(e){}}
  throw new Error('Could not parse JSON from Claude response');
}

document.addEventListener('DOMContentLoaded',()=>{updateSettingsStatus();checkReady();});
</script>
